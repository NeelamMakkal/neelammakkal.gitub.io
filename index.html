<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelam Makkal | Library of Revolution</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@1,600&family=Kavivanar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { --makkal-blue: #0033cc; --soft-glow: rgba(0, 51, 204, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #ffffff; overflow-x: hidden; }

        /* Background Chakra */
        .chakra-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; opacity: 0.1; }
        .ashoka-chakra { width: 80vh; height: 80vh; background: url('https://upload.wikimedia.org/wikipedia/commons/1/17/Ashoka_Chakra.svg') no-repeat center; background-size: contain; animation: spin 60s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        header { position: fixed; top: 0; width: 100%; padding: 10px 5%; display: flex; justify-content: space-between; background: white; border-bottom: 2px solid var(--makkal-blue); z-index: 3000; }
        .logo-box img { height: 45px; }

        /* Reader Overlay */
        #pdf-reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 4000; flex-direction: column; }
        
        .reader-toolbar { background: #f8f9fa; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; border-bottom: 2px solid var(--makkal-blue); }
        
        .lang-select { padding: 8px; border: 2px solid var(--makkal-blue); border-radius: 5px; font-weight: bold; }
        
        #book-viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #ddd; overflow: hidden; position: relative; }
        #flipbook { width: 800px; height: 500px; }
        .page { background: white; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; }

        /* Professional Controls */
        .reader-controls { padding: 15px; display: flex; justify-content: center; gap: 10px; background: white; border-top: 1px solid #ccc; }
        .reader-btn { background: var(--makkal-blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .voice-btn { background: #28a745; }
        .stop-btn { background: #dc3545; }

        /* Hero & Content */
        .hero-section { text-align: center; padding: 120px 20px 50px; }
        .hero-section h1 { font-family: 'Cinzel Decorative'; color: var(--makkal-blue); font-size: 50px; }
        .banner-blue { background: var(--makkal-blue); color: white; text-align: center; padding: 15px; font-family: 'Cinzel Decorative'; font-size: 20px; }
        .book-library { display: flex; justify-content: center; padding: 50px; }
        .book-wrap { width: 200px; cursor: pointer; text-align: center; }
        .book-card img { width: 100%; border-left: 5px solid #001a66; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); }

        /* Translation Box (Floating) */
        #translated-text-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(255,255,255,0.95); padding: 15px; border-radius: 10px; border: 2px solid var(--makkal-blue); display: none; max-height: 150px; overflow-y: auto; z-index: 5000; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="chakra-container"><div class="ashoka-chakra"></div></div>

    <header>
        <div class="logo-box"><img src="logo.png" alt="Logo"></div>
        <div style="color: var(--makkal-blue); font-size: 24px; cursor: pointer;" onclick="alert('Menu Clicked')">☰</div>
    </header>

    <main id="home">
        <section class="hero-section">
            <h1>NEELAM MAKKAL</h1>
            <p>BUILT WITH AMBEDKARITE, PERIYARIST & MARXIST IDEOLOGIES</p>
        </section>

        <div class="banner-blue">BOOKS COLLECTION</div>
        <div class="book-library">
            <div class="book-wrap" onclick="openBook('constitution.pdf')">
                <div class="book-card"><img src="constitutioncover.jpg" alt="Book"></div>
                <p style="margin-top:10px; font-weight:bold; color:var(--makkal-blue)">CONSTITUTION OF INDIA</p>
            </div>
        </div>
    </main>

    <!-- ADVANCED READER -->
    <div id="pdf-reader-overlay">
        <div class="reader-toolbar">
            <select id="target-lang" class="lang-select">
                <option value="hi-IN">Hindi (हिन्दी)</option>
                <option value="ta-IN">Tamil (தமிழ்)</option>
                <option value="te-IN">Telugu (తెలుగు)</option>
                <option value="mr-IN">Marathi (मराठी)</option>
                <option value="bn-IN">Bengali (বাংলা)</option>
                <option value="kn-IN">Kannada (ಕನ್ನಡ)</option>
                <option value="ml-IN">Malayalam (മലയാളம்)</option>
                <option value="gu-IN">Gujarati (ગુજરાતી)</option>
                <option value="pa-IN">Punjabi (ਪੰਜਾਬੀ)</option>
                <option value="en-US">English</option>
            </select>
            <button class="reader-btn voice-btn" onclick="translateAndRead()"><i class="fa fa-language"></i> TRANSLATE & READ ALOUD</button>
            <button class="reader-btn stop-btn" onclick="stopAudio()"><i class="fa fa-stop"></i> STOP</button>
        </div>

        <div id="book-viewport">
            <div id="flipbook"></div>
            <div id="translated-text-box"></div>
        </div>

        <div class="reader-controls">
            <button class="reader-btn" onclick="prevPage()">PREVIOUS</button>
            <button class="reader-btn" style="background:red" onclick="closeBook()">CLOSE</button>
            <button class="reader-btn" onclick="nextPage()">NEXT</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let pdfDoc = null, pageTexts = [], synth = window.speechSynthesis;

        async function openBook(url) {
            document.getElementById('pdf-reader-overlay').style.display = 'flex';
            const flipbook = $("#flipbook");
            if (flipbook.data().turn) { flipbook.turn("destroy"); }
            flipbook.empty();

            const loadingTask = pdfjsLib.getDocument(url);
            pdfDoc = await loadingTask.promise;

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.2 });
                const pageDiv = $('<div class="page"></div>');
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                // Extract Text
                const content = await page.getTextContent();
                pageTexts[i] = content.items.map(s => s.str).join(' ');

                pageDiv.append(canvas);
                flipbook.append(pageDiv);
            }

            flipbook.turn({ width: 800, height: 500, autoCenter: true, display: 'single' });
        }

        async function translateAndRead() {
            stopAudio();
            const pageNum = $("#flipbook").turn("page");
            const text = pageTexts[pageNum];
            const lang = document.getElementById('target-lang').value;
            const textBox = document.getElementById('translated-text-box');

            if (!text) return;

            textBox.style.display = 'block';
            textBox.innerText = "Translating page content...";

            // Using a free Translation API (LibreTranslate or Google Script Mockup)
            // Note: For production, a Google Cloud Translation API key is recommended.
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${lang.split('-')[0]}&dt=t&q=${encodeURI(text)}`);
                const data = await res.json();
                const translatedText = data[0].map(x => x[0]).join('');
                
                textBox.innerText = translatedText;

                // AI Voice
                const utterance = new SpeechSynthesisUtterance(translatedText);
                utterance.lang = lang;
                utterance.rate = 0.9;
                synth.speak(utterance);
            } catch (e) {
                textBox.innerText = "Translation Error. Reading Original Text...";
                const utterance = new SpeechSynthesisUtterance(text);
                synth.speak(utterance);
            }
        }

        function stopAudio() { synth.cancel(); document.getElementById('translated-text-box').style.display = 'none'; }
        function closeBook() { stopAudio(); document.getElementById('pdf-reader-overlay').style.display = 'none'; }
        function nextPage() { $("#flipbook").turn("next"); }
        function prevPage() { $("#flipbook").turn("previous"); }
    </script>
</body>
</html>
