<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelam Makkal | Library of Revolution</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@1,600&family=Kavivanar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root { --makkal-blue: #0033cc; --soft-glow: rgba(0, 51, 204, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #ffffff; color: #1a1a1a; overflow-x: hidden; }

        /* --- BACKGROUND CHAKRA --- */
        .chakra-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -1; opacity: 0.1; }
        .ashoka-chakra { width: 80vh; height: 80vh; background: url('https://upload.wikimedia.org/wikipedia/commons/1/17/Ashoka_Chakra.svg') no-repeat center; background-size: contain; animation: spin 60s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- HEADER --- */
        header { position: fixed; top: 0; width: 100%; padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: white; border-bottom: 2px solid var(--makkal-blue); }
        .logo-box img { height: 40px; cursor: pointer; }
        .menu-trigger { font-size: 24px; color: var(--makkal-blue); cursor: pointer; }

        /* --- MAIN UI --- */
        .hero-section { text-align: center; padding: 120px 20px 40px; }
        .hero-section h1 { font-family: 'Cinzel Decorative'; font-size: clamp(30px, 6vw, 60px); color: var(--makkal-blue); }
        .book-library { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; padding: 40px 10%; }
        .book-wrap { width: 150px; cursor: pointer; text-align: center; transition: 0.3s; }
        .book-wrap:hover { transform: translateY(-10px); }
        .book-card img { width: 100%; border-radius: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .book-title-sub { font-size: 12px; margin-top: 10px; font-weight: bold; color: var(--makkal-blue); }

        /* --- PROFESSIONAL PDF READER OVERLAY --- */
        #pdf-reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c2c2c; z-index: 2000; flex-direction: column; }
        
        .reader-toolbar { background: var(--makkal-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .reader-container { display: flex; flex: 1; overflow: hidden; }
        #reader-sidebar { width: 250px; background: white; overflow-y: auto; display: none; border-right: 1px solid #ddd; padding: 15px; }
        #book-viewport { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: center; background: #525659; }

        #flipbook { width: 800px; height: 550px; visibility: hidden; }
        .page { background: white; display: flex; align-items: center; justify-content: center; }
        canvas { width: 100% !important; height: 100% !important; }

        /* --- VOICE & CONTROLS --- */
        .reader-controls { background: white; padding: 10px; display: flex; justify-content: center; align-items: center; gap: 15px; border-top: 2px solid var(--makkal-blue); flex-wrap: wrap; }
        .reader-btn { background: var(--makkal-blue); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .voice-settings { display: flex; align-items: center; gap: 5px; background: #f0f0f0; padding: 5px 10px; border-radius: 4px; }
        select#voice-select { font-size: 11px; padding: 2px; max-width: 150px; }

        #loading-msg { color: white; font-weight: bold; position: absolute; }

        @media (max-width: 768px) {
            #flipbook { width: 95vw; height: 70vh; }
            #reader-sidebar { position: absolute; z-index: 10; height: 100%; }
        }
    </style>
</head>
<body>

    <div class="chakra-container"><div class="ashoka-chakra"></div></div>

    <header>
        <div class="logo-box"><img src="logo.png" alt="NEELAM MAKKAL" onclick="location.reload()"></div>
        <div class="menu-trigger">☰</div>
    </header>

    <main id="home">
        <section class="hero-section">
            <h1>NEELAM MAKKAL</h1>
            <p style="letter-spacing: 2px; font-size: 12px; margin-top: 10px;">LIBRARY OF REVOLUTION</p>
        </section>

        <div class="book-library">
            <div class="book-wrap" onclick="openBook('constitution.pdf')">
                <div class="book-card"><img src="constitutioncover.jpg" alt="Book"></div>
                <p class="book-title-sub">CONSTITUTION OF INDIA</p>
            </div>
            <div class="book-wrap" onclick="openBook('Collectedworksofperiyar.pdf')">
                <div class="book-card"><img src="Collectedworksofperiyar.jpg" alt="Book"></div>
                <p class="book-title-sub">PERIYAR COLLECTED WORKS</p>
            </div>
        </div>
    </main>

    <div id="pdf-reader-overlay">
        <div class="reader-toolbar">
            <button class="reader-btn" onclick="toggleSidebar()"><i class="fa fa-list"></i> INDEX</button>
            <div style="font-family: 'Cinzel Decorative'; font-size: 14px;">NEELAM READER</div>
            <button class="reader-btn" style="background:#cc0000;" onclick="closeBook()"><i class="fa fa-times"></i></button>
        </div>

        <div class="reader-container">
            <div id="reader-sidebar">
                <h4 style="margin-bottom:10px; font-size:14px; color:var(--makkal-blue)">CONTENTS</h4>
                <div id="toc-list" style="font-size:12px;">No Index found</div>
            </div>
            <div id="book-viewport">
                <div id="loading-msg">REVOLUTION LOADING...</div>
                <div id="flipbook"></div>
            </div>
        </div>

        <div class="reader-controls">
            <button class="reader-btn" onclick="prevPage()"><i class="fa fa-chevron-left"></i></button>
            <span id="page-info" style="font-size:12px; font-weight:bold;">1 / 1</span>
            <button class="reader-btn" onclick="nextPage()"><i class="fa fa-chevron-right"></i></button>
            
            <div class="voice-settings">
                <i class="fa fa-globe"></i>
                <select id="voice-select"><option>Loading Voices...</option></select>
                <button id="listen-btn" class="reader-btn" style="background:#28a745;" onclick="toggleSpeech()">
                    <i class="fa fa-volume-up"></i> LISTEN
                </button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null, currentZoom = 1, synth = window.speechSynthesis, voices = [];

        // 1. LOAD WORLD LANGUAGES
        function loadVoices() {
            voices = synth.getVoices();
            const select = document.getElementById('voice-select');
            select.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name} (${v.lang})</option>`).join('');
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // 2. OPEN BOOK SYSTEM
        async function openBook(url) {
            $("#pdf-reader-overlay").css('display', 'flex');
            $("#loading-msg").show();
            const flipbook = $("#flipbook");
            if (flipbook.data().turn) flipbook.turn("destroy");
            flipbook.empty().css('visibility', 'hidden');

            try {
                pdfDoc = await pdfjsLib.getDocument(url).promise;
                renderPages();
                renderOutline();
            } catch (e) { alert("Book Error!"); }
        }

        async function renderPages() {
            const flipbook = $("#flipbook");
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const pageDiv = $('<div class="page"></div>');
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                pageDiv.append(canvas);
                flipbook.append(pageDiv);
            }
            $("#loading-msg").hide();
            flipbook.css('visibility', 'visible').turn({
                width: 800, height: 550, autoCenter: true,
                display: $(window).width() > 800 ? 'double' : 'single',
                when: { turned: (e, page) => $("#page-info").text(`${page} / ${pdfDoc.numPages}`) }
            });
        }

        // 3. LISTEN FEATURE (WORLD LANGUAGES)
        async function toggleSpeech() {
            if (synth.speaking) {
                synth.cancel();
                $("#listen-btn").html('<i class="fa fa-volume-up"></i> LISTEN').css('background', '#28a745');
                return;
            }

            const pageNum = $("#flipbook").turn("page");
            const page = await pdfDoc.getPage(pageNum);
            const textContent = await page.getTextContent();
            const text = textContent.items.map(s => s.str).join(" ");

            if (text.trim()) {
                const utter = new SpeechSynthesisUtterance(text);
                const selectedVoiceIndex = document.getElementById('voice-select').value;
                utter.voice = voices[selectedVoiceIndex];
                
                utter.onstart = () => $("#listen-btn").html('<i class="fa fa-stop"></i> STOP').css('background', 'orange');
                utter.onend = () => $("#listen-btn").html('<i class="fa fa-volume-up"></i> LISTEN').css('background', '#28a745');
                
                synth.speak(utter);
            }
        }

        // 4. EXTRA FUNCTIONS
        function closeBook() { synth.cancel(); $("#pdf-reader-overlay").hide(); }
        function nextPage() { $("#flipbook").turn("next"); }
        function prevPage() { $("#flipbook").turn("previous"); }
        function toggleSidebar() { $("#reader-sidebar").toggle(); }
        async function renderOutline() {
            const outline = await pdfDoc.getOutline();
            const list = $("#toc-list"); list.empty();
            if (outline) outline.forEach(o => list.append(`<div style="padding:5px; border-bottom:1px solid #eee; cursor:pointer">${o.title}</div>`));
        }
    </script>
</body>
                </html>
